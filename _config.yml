title: "Grupo Sintáctico"
subtitle: "Lecturas de sintaxis para estudiantes de Letras"
description: "Sitio del Grupo Sintáctico: lecturas, actividades, calendario e integrantes."
url: ""
baseurl: ""
repository: ""

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"

locale: "es-AR"
timezone: "America/Argentina/Buenos_Aires"

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap

markdown: kramdown

atom_feed:
  hide: true

search: false

include:
  - _pages

collections:
  pages:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: false
      share: false
      related: false

footer:
  links: []
