title: "Grupo Sintáctico"
subtitle: "Facultad de Filosofía y Letras (UBA)"
description: "Sitio del Grupo Sintáctico, de la Facultad de Filosofía y Letras (UBA): lecturas, actividades, calendario e integrantes."
logo: "/assets/img/gs-logo.svg"
url: "https://pablozd.ar"
baseurl: "/grupo-sintactico"
repository: ""

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"

locale: "es-AR"
timezone: "America/Argentina/Buenos_Aires"

languages: ["es", "en"]
default_lang: "es"
exclude_from_localization: ["assets", "sitemap.xml"]
parallel_localization: true

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-polyglot

markdown: kramdown

sass:
  sourcemap: never

atom_feed:
  hide: true

search: false

include:
  - _pages

collections:
  pages:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: false
      share: false
      related: false

footer:
  links: []
